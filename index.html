<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>十二星座专属对象测试</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:#f2f2f7;
  display:flex;
  justify-content:center;
}

.container{
  max-width:420px;
  width:100%;
  padding:20px;
}

.card{
  background:#fff;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

h1{
  font-size:22px;
}

button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  background:#007aff;
  color:#fff;
  font-size:15px;
}

img{
  width:100%;
  border-radius:12px;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>十二星座专属对象测试</h1>
<p style="color:#888;font-size:13px;">测一测你的理想对象是谁 😏</p>

<h3 id="q">点击开始</h3>
<div id="options"></div>

<button onclick="start()">开始测试</button>

</div>
</div>

<script>
const questions = [
{
q:"1.你喜欢身高多少？",
o:["170以下","170-175","175-180","180以上"]
},
{
q:"2.你喜欢奶狗还是狼狗？",
o:["奶狗","狼狗"]
},
{
q:"3.你喜欢长发男还是短发男？",
o:["长发","短发"]
},
{
q:"4.你喜欢什么星座？",
o:["白羊座","金牛座","双子座","巨蟹座","狮子座","处女座","天秤座","天蝎座","射手座","摩羯座","水瓶座","双鱼座"]
},
{
q:"5.你喜欢薄肌还是厚肌？",
o:["薄肌","厚肌"]
}
];

let i=0;

function start(){
i=0;
show();
}

function show(){
let q=questions[i];
document.getElementById("q").innerText=q.q;

let html="";
q.o.forEach(x=>{
html+=`<button onclick="next()">${x}</button>`;
});

document.getElementById("options").innerHTML=html;
}

function next(){
i++;
if(i<questions.length){
show();
}else{
result();
}
}

function result(){

const imgs=[
"1.JPG",
"2.JPG",
"3.JPG",
"4.JPG",
"5.JPG",
"6.JPG",
"7.JPG"
];

let r=imgs[Math.floor(Math.random()*imgs.length)];

document.getElementById("q").innerText="你的专属对象已出现 👇";

document.getElementById("options").innerHTML=
`<img src="${r}">
<p style="text-align:center;margin-top:10px;">就是他了，别挑了 😏</p>`;
}
</script>

</body>
</html>
